outsideWork:
  eyebrow: "Outside the Work"
  headline: "Outside the work"
  body: |
    I’m drawn to hard systems, long races, and outdoor hobbies that occasionally make gravity a stakeholder.

    Certified skydiver. Snowboarding learner. Mountain biking enthusiast. Hiking and camping whenever possible. Generally optimistic around fresh air, hard problems, and Type 2 fun.

    The overlap with AI work is bigger than it sounds: preparation matters, feedback loops matter, and confidence without respect for failure modes is how you end up in a tree.

